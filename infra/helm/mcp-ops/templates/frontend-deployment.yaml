apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-ops-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: mcp-ops-frontend
  template:
    metadata:
      labels:
        app: mcp-ops-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          ports:
            - containerPort: {{ .Values.frontend.servicePort }}
